<section class="ciaf-events-section" id="agenda-ciaf">
  <div class="ciaf-events-section__grid" aria-hidden="true"></div>

  <div class="container-xxl ciaf-events-container">
    <div class="ciaf-events-header d-flex align-items-end justify-content-between gap-4 mb-5">
      <div>
        <span class="ciaf-pill ciaf-pill--compact ciaf-pill--events fs-12 fw-bold rounded-pill px-3">AGENDA CIAF</span>

        <h2 class=" fs-48 fw-black m-0 mt-3 text-white">
          Próximos <span class="ciaf-gradient-text ciaf-gradient-text--accent">eventos</span>
        </h2>
      </div>

      <a href="#" class="ciaf-btn ciaf-btn--events-all fs-14 fw-bold gap-2 rounded-pill px-4">
        Ver todos los eventos
        <i class="fa-solid fa-arrow-up-right-from-square"></i>
      </a>
    </div>

    <ngx-slick-carousel
      *ngIf="listarEventos?.length"
      class="ciaf-events-carousel"
      #slickModal="slick-carousel"
      [config]="slideConfig"
    >
      <article ngxSlickItem *ngFor="let datos of listarEventos" class="ciaf-event-card mx-2 p-4 rounded-5">
        <div class="ciaf-event-card__head d-flex gap-3 mb-4">
          <div class="ciaf-event-date rounded-3">
            <span class="ciaf-event-date__day fs-20 fw-extrablack">{{ datos.fecha_inicio | date:'d' }}</span>
            <span class="ciaf-event-date__month fs-10 fw-black mt-1">{{ datos.fecha_inicio | date:'MMM' }}</span>
          </div>

          <div>
            <span class="ciaf-event-tag fs-10 fw-black mb-1 py-1 px-2 rounded-pill">{{ getEventTag(datos) }}</span>
            <h3 class="fs-18 ">{{ datos.evento }}</h3>
            <p class="fs-12 text-color-4 d-flex gap-1 mt-1 fw-bold">
              <i class="fa-solid fa-location-dot" aria-hidden="true"></i>
              {{ getEventLocation(datos) }}
            </p>
          </div>
        </div>

        <p class="fs-14 mb-4 pt-1 text-color-4 fw-semibold">{{ getEventDescription(datos) }}</p>

        <div class="ciaf-event-card__footer fw-black d-flex gap-3 pt-4">
          <a href="#" class="text-color-4 fs-12">
            <i class="fa-regular fa-calendar m-1" aria-hidden="true"></i>
            AGENDAR
          </a>

          <a
            [href]="getEventLink(datos)"
            class="ciaf-event-link--cta fs-14"
            target="_blank"
            rel="noopener noreferrer"
          >
            Registrarme
            <i class="fa-solid fa-arrow-up-right-from-square m-1" aria-hidden="true"></i>
          </a>
        </div>
      </article>
    </ngx-slick-carousel>
  </div>
</section>
