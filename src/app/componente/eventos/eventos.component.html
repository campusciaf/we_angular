<section class="ciaf-events-section" id="agenda-ciaf">
  <div class="ciaf-events-section__grid" aria-hidden="true"></div>

  <div class="container-xxl ciaf-events-container">
    <div class="ciaf-events-header">
      <div>
        <span class="ciaf-pill ciaf-pill--compact ciaf-pill--events">AGENDA CIAF</span>

        <h2 class="ciaf-title-display ciaf-title-display--events">
          Próximos <span class="ciaf-gradient-text ciaf-gradient-text--accent">eventos</span>
        </h2>
      </div>

      <a href="#" class="ciaf-btn ciaf-btn--events-all">
        Ver todos los eventos
        <i class="fa-solid fa-arrow-up-right-from-square"></i>
      </a>
    </div>

    <ngx-slick-carousel
      *ngIf="listarEventos?.length"
      class="ciaf-events-carousel"
      #slickModal="slick-carousel"
      [config]="slideConfig"
    >
      <article ngxSlickItem *ngFor="let datos of listarEventos" class="ciaf-event-card">
        <div class="ciaf-event-card__head">
          <div class="ciaf-event-date">
            <span class="ciaf-event-date__day">{{ datos.fecha_inicio | date:'d' }}</span>
            <span class="ciaf-event-date__month">{{ datos.fecha_inicio | date:'MMM' }}</span>
          </div>

          <div>
            <span class="ciaf-event-tag">{{ getEventTag(datos) }}</span>
            <h3 class="ciaf-event-card__title">{{ datos.evento }}</h3>
            <p class="ciaf-event-card__meta">
              <i class="fa-solid fa-location-dot" aria-hidden="true"></i>
              {{ getEventLocation(datos) }}
            </p>
          </div>
        </div>

        <p class="ciaf-event-card__text">{{ getEventDescription(datos) }}</p>

        <div class="ciaf-event-card__footer">
          <a href="#" class="ciaf-event-link--muted">
            <i class="fa-regular fa-calendar" aria-hidden="true"></i>
            Agendar
          </a>

          <a
            [href]="getEventLink(datos)"
            class="ciaf-event-link--cta"
            target="_blank"
            rel="noopener noreferrer"
          >
            Registrarme
            <i class="fa-solid fa-arrow-up-right-from-square" aria-hidden="true"></i>
          </a>
        </div>
      </article>
    </ngx-slick-carousel>
  </div>
</section>
