<section class="ciaf-quick-access-section">
  <div class="container-xxl ciaf-quick-access-container">

    <header class="ciaf-quick-access-header">
      <span class="ciaf-pill ciaf-pill--compact fs-10 fw-bold">ACCESOS RÁPIDOS</span>
      <h2 class="ciaf-title-display ciaf-title-display--quick-access fs-48 fw-black">
        Todo a un <span class="ciaf-gradient-text ciaf-gradient-text--brand">clic.</span>
      </h2>
    </header>

    <div class="ciaf-quick-access-grid">
      <ng-container *ngFor="let acceso of accesos">

        <a
          *ngIf="acceso.tipoEnlace === 'externo'"
          class="ciaf-quick-access-card"
          [href]="acceso.enlace"
          target="_blank"
          rel="noopener noreferrer"
        >
          <ng-container *ngTemplateOutlet="contenidoTarjeta; context: { $implicit: acceso }"></ng-container>
        </a>

        <a
          *ngIf="acceso.tipoEnlace === 'ruta'"
          class="ciaf-quick-access-card"
          [routerLink]="acceso.enlace"
        >
          <ng-container *ngTemplateOutlet="contenidoTarjeta; context: { $implicit: acceso }"></ng-container>
        </a>

        <a
          *ngIf="acceso.tipoEnlace === 'modal'"
          class="ciaf-quick-access-card"
          [href]="acceso.enlace"
          data-bs-toggle="modal"
        >
          <ng-container *ngTemplateOutlet="contenidoTarjeta; context: { $implicit: acceso }"></ng-container>
        </a>

      </ng-container>
    </div>

  </div>
</section>

<ng-template #contenidoTarjeta let-acceso>
  <span
    class="ciaf-quick-access-card__icon fs-18"
    [class.ciaf-quick-access-card__icon--primary]="acceso.tonoIcono === 'primary'"
    [class.ciaf-quick-access-card__icon--lime]="acceso.tonoIcono === 'lime'"
    aria-hidden="true"
  >
    <i class="fa-solid" [ngClass]="acceso.icono"></i>
  </span>

  <div class="ciaf-quick-access-card__content">
    <h3 class="ciaf-quick-access-card__title fs-16 fw-extrablack">{{ acceso.titulo }}</h3>
    <p class="ciaf-quick-access-card__subtitle fs-12">{{ acceso.subtitulo }}</p>
  </div>

  <i class="fa-solid fa-arrow-up-right-from-square ciaf-quick-access-card__arrow fs-14" aria-hidden="true"></i>
</ng-template>

  <!-- Modalsst-->
  <div class="modal fade" id="modalcv" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-6" id="exampleModalLabel">Quiero ser</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body p-0">

          <div class="row justify-content-center">
            <div class="col-6 text-center">
                <a href="https://ciaf.digital/cv/vistas/login.html" target="_blank" class="btn btn-info d-block py-4 rounded-0" >
                    <img src="assets/image/trabaja-nosotros.webp">
                    <p>Docente</p>
                </a>
            </div>

            <div class="col-6 text-center">
                <a routerLink="/cvadministrativos" class="btn btn-primary py-4 rounded-0 d-block" data-bs-dismiss="modal" aria-label="Close">
                    <img src="assets/image/funcionarios.webp">
                    <p>Administrativo</p>
                </a>
            </div>
          </div>

        </div>

      </div>
    </div>
  </div>
