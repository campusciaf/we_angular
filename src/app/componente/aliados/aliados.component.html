<section class="ciaf-allies-section">
  <div class="container-xxl ciaf-allies-container">

    <header class="ciaf-allies-header">
      <span class="ciaf-pill ciaf-pill--allies fs-10">CONVENIOS CIAF</span>
      <h2 class="ciaf-title-display ciaf-title-display--allies fs-48">Aliados Estratégicos</h2>
      <p class="ciaf-text-lead ciaf-text-lead--muted ciaf-text-lead--center fs-16">
        Convenios, alianzas académicas y financieras que potencian la experiencia y empleabilidad de cada estudiante CIAF.
      </p>
    </header>

    <div class="ciaf-allies-slider-wrap" *ngIf="listarAliados?.length && usarCarrusel">
      <div
        #viewport
        class="ciaf-allies-slider"
        (pointerdown)="onPointerDown($event)"
        (pointermove)="onPointerMove($event)"
        (pointerup)="onPointerUp($event)"
        (pointercancel)="onPointerUp($event)"
        (pointerleave)="onPointerLeave($event)"
      >
        <div
          class="ciaf-allies-slider__track"
          [class.ciaf-allies-slider__track--anim]="animando"
          [style.transform]="'translate3d(' + desplazamiento + 'px, 0, 0)'"
          [style.--ciaf-allies-card-width.px]="anchoTarjeta"
        >
          <a
            *ngFor="let aliado of listarAliados"
            class="ciaf-allies-card"
            [href]="aliado.url_aliado || '#'"
            [attr.target]="aliado.url_aliado ? '_blank' : null"
            [attr.rel]="aliado.url_aliado ? 'noopener noreferrer' : null"
          >
            <img
              *ngIf="getImagenUrl(aliado)"
              [src]="getImagenUrl(aliado)"
              [alt]="aliado.nombre_aliado"
              loading="lazy"
              draggable="false"
            />
            <span *ngIf="!getImagenUrl(aliado)" class="ciaf-allies-card__name fs-14">{{ aliado.nombre_aliado }}</span>
          </a>
        </div>
      </div>
    </div>

    <div class="ciaf-allies-grid" *ngIf="listarAliados?.length && !usarCarrusel">
      <a
        *ngFor="let aliado of listarAliados"
        class="ciaf-allies-card"
        [href]="aliado.url_aliado || '#'"
        [attr.target]="aliado.url_aliado ? '_blank' : null"
        [attr.rel]="aliado.url_aliado ? 'noopener noreferrer' : null"
      >
        <img
          *ngIf="getImagenUrl(aliado)"
          [src]="getImagenUrl(aliado)"
          [alt]="aliado.nombre_aliado"
          loading="lazy"
          draggable="false"
        />
        <span *ngIf="!getImagenUrl(aliado)" class="ciaf-allies-card__name fs-14">{{ aliado.nombre_aliado }}</span>
      </a>
    </div>

  </div>
</section>
